<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FNEX Avatar</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f6f7f8; padding: 16px; }
.wrap { max-width: 420px; margin: 0 auto; background: #fff; border-radius: 20px; padding: 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); }
h2 { font-size: 18px; font-weight: 700; text-align: center; margin-bottom: 20px; color: #0f172a; }
.preview-area { display: flex; flex-direction: column; align-items: center; gap: 16px; margin-bottom: 28px; }
.avatar-frame { width: 140px; height: 140px; border-radius: 50%; border: 4px solid #e2e8f0; overflow: hidden; background: #f1f5f9; box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
.avatar-frame img { width: 140px; height: 140px; display: block; }
.nickname-row { display: flex; gap: 8px; width: 100%; }
.nickname-input { flex: 1; padding: 10px 14px; border-radius: 10px; border: 1.5px solid #e2e8f0; font-size: 14px; outline: none; font-family: 'Inter', sans-serif; color: #1e293b; }
.nickname-input:focus { border-color: #025a93; }
.apply-btn { padding: 10px 16px; border-radius: 10px; background: #025a93; color: #fff; border: none; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }

.section-label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 10px; font-weight: 600; }

/* 아바타 프리셋 그리드 */
.preset-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.preset-item { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; }
.preset-img { width: 70px; height: 70px; border-radius: 50%; border: 2.5px solid #e2e8f0; overflow: hidden; background: #f8fafc; transition: all 0.15s; }
.preset-img img { width: 70px; height: 70px; display: block; }
.preset-img.sel { border: 3px solid #025a93; box-shadow: 0 0 0 3px rgba(2,90,147,0.2); }
.preset-label { font-size: 10px; color: #94a3b8; font-weight: 600; text-align: center; }

/* 배경색 */
.color-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.color-dot { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid #e2e8f0; transition: all 0.15s; }
.color-dot.sel { border: 2px solid #025a93; box-shadow: 0 0 0 2px #fff, 0 0 0 4px #025a93; transform: scale(1.1); }

.random-btn { width: 100%; padding: 12px; border-radius: 10px; border: 1.5px solid #e2e8f0; background: #f8fafc; cursor: pointer; font-size: 14px; font-weight: 600; color: #475569; margin-top: 4px; }
.save-btn { width: 100%; padding: 14px; background: #025a93; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <h2>🎨 アバター設定</h2>

  <div class="preview-area">
    <div class="avatar-frame">
      <img id="mainAvatar" src="" alt="avatar"/>
    </div>
    <div class="nickname-row">
      <input class="nickname-input" id="nicknameInput" placeholder="닉네임 입력..." value="Trader_Kim"/>
      <button class="apply-btn" onclick="applyNickname()">적용</button>
    </div>
  </div>

  <div class="section-label">🎭 아바타 선택 (클릭해서 고르세요)</div>
  <div class="preset-grid" id="presetGrid"></div>

  <div class="section-label">🎨 배경색</div>
  <div class="color-grid" id="colorGrid"></div>

  <button class="random-btn" onclick="randomize()">🔀 랜덤으로 바꾸기</button>
  <button class="save-btn" onclick="saveAvatar()">アバターを保存 / 아바타 저장</button>
</div>

<script>
var currentSeed = 'Trader_Kim';
var currentBg = 'b6e3f4';
var selectedPreset = null;

// 다양한 시드로 아바타 프리셋 24개
var PRESETS = [
  {seed:'Alpha Wolf', label:'Wolf'},
  {seed:'Silver Fox', label:'Fox'},
  {seed:'Blue Eagle', label:'Eagle'},
  {seed:'Red Panda', label:'Panda'},
  {seed:'Dark Tiger', label:'Tiger'},
  {seed:'Ocean Wave', label:'Ocean'},
  {seed:'Fire Storm', label:'Storm'},
  {seed:'Green Leaf', label:'Leaf'},
  {seed:'Star Nova', label:'Nova'},
  {seed:'Moon Shine', label:'Moon'},
  {seed:'Sun Blaze', label:'Blaze'},
  {seed:'Ice Crystal', label:'Ice'},
  {seed:'Gold Rush', label:'Gold'},
  {seed:'Shadow Ace', label:'Ace'},
  {seed:'Purple Zen', label:'Zen'},
  {seed:'Pink Dream', label:'Dream'},
  {seed:'Black Night', label:'Night'},
  {seed:'White Snow', label:'Snow'},
  {seed:'Cyber Punk', label:'Cyber'},
  {seed:'Neon Light', label:'Neon'},
  {seed:'Retro Wave', label:'Retro'},
  {seed:'Future Tech', label:'Tech'},
  {seed:'Wild Nature', label:'Wild'},
  {seed:'Urban Style', label:'Urban'},
];

var BG_COLORS = [
  'b6e3f4','c0aede','d1d4f9','ffd5dc',
  'ffdfbf','f0fff4','e8f4ff','fff3e0',
  'f3e5f5','e0f7fa','fce4ec','e8f5e9',
  'dff5e3','e8e4f9','ffe4b5','e0e0e0'
];

function getUrl(seed, size) {
  return 'https://api.multiavatar.com/' + encodeURIComponent(seed) + '.png?apikey=&size=' + (size||140);
}

function updateMain() {
  document.getElementById('mainAvatar').src = getUrl(currentSeed, 140);
}

function applyNickname() {
  var val = document.getElementById('nicknameInput').value.trim();
  if(val) {
    currentSeed = val;
    selectedPreset = null;
    document.querySelectorAll('.preset-img').forEach(function(d){ d.classList.remove('sel'); });
    updateMain();
  }
}

function renderPresets() {
  var grid = document.getElementById('presetGrid');
  grid.innerHTML = '';
  PRESETS.forEach(function(p, i) {
    var div = document.createElement('div');
    div.className = 'preset-item';
    var imgDiv = document.createElement('div');
    imgDiv.className = 'preset-img' + (currentSeed === p.seed ? ' sel' : '');
    var img = document.createElement('img');
    img.src = getUrl(p.seed, 70);
    img.width = 70; img.height = 70;
    img.loading = 'lazy';
    imgDiv.appendChild(img);
    var span = document.createElement('span');
    span.className = 'preset-label';
    span.textContent = p.label;
    div.appendChild(imgDiv);
    div.appendChild(span);
    div.onclick = (function(preset, id) {
      return function() {
        currentSeed = preset.seed;
        document.getElementById('nicknameInput').value = preset.seed;
        document.querySelectorAll('.preset-img').forEach(function(d){ d.classList.remove('sel'); });
        id.classList.add('sel');
        updateMain();
      };
    })(p, imgDiv);
    grid.appendChild(div);
  });
}

function renderColors() {
  var grid = document.getElementById('colorGrid');
  grid.innerHTML = '';
  BG_COLORS.forEach(function(c) {
    var dot = document.createElement('div');
    dot.className = 'color-dot' + (currentBg === c ? ' sel' : '');
    dot.style.background = '#' + c;
    dot.onclick = function() {
      currentBg = c;
      grid.querySelectorAll('.color-dot').forEach(function(d){ d.classList.remove('sel'); });
      dot.classList.add('sel');
      // Multiavatar는 배경색 파라미터 없음 - 프레임 배경색만 변경
      document.querySelector('.avatar-frame').style.background = '#' + c;
    };
    grid.appendChild(dot);
  });
}

function randomize() {
  var adjectives = ['Cool','Wild','Dark','Bright','Swift','Bold','Calm','Sharp','Wise','Noble'];
  var nouns = ['Trader','Wolf','Eagle','Tiger','Panda','Fox','Lion','Bear','Hawk','Dragon'];
  var seed = adjectives[Math.floor(Math.random()*adjectives.length)] + ' ' + nouns[Math.floor(Math.random()*nouns.length)] + Math.floor(Math.random()*999);
  currentSeed = seed;
  document.getElementById('nicknameInput').value = seed;
  document.querySelectorAll('.preset-img').forEach(function(d){ d.classList.remove('sel'); });
  updateMain();
}

function saveAvatar() {
  var btn = document.querySelector('.save-btn');
  btn.textContent = '✓ 保存しました！/ 저장됐어요!';
  btn.style.background = '#16a34a';
  setTimeout(function(){
    btn.textContent = 'アバターを保存 / 아바타 저장';
    btn.style.background = '#025a93';
  }, 2000);
}

// 엔터키로 닉네임 적용
document.getElementById('nicknameInput').addEventListener('keypress', function(e) {
  if(e.key === 'Enter') applyNickname();
});

renderPresets();
renderColors();
updateMain();
</script>
</body>
</html>
